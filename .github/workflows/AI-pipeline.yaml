name: DevSecOps + Agentic AI(final)

on:
  push:
  pull_request:

env:
  REPORT_DIR: reports
  FIX_DIR: ai-fixes

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:

# =========================
# 🔹 1. SEMGREP FULL SCAN
# =========================
  scan:
    runs-on: ubuntu-latest
  
    outputs:
      critical: ${{ steps.count.outputs.critical }}
      high: ${{ steps.count.outputs.high }}
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Install tools
        run: pip install semgrep jq
  
      - name: Run scan
        run: |
          mkdir -p reports
          semgrep --config=auto --json > reports/semgrep.json || echo '{"results":[]}' > reports/semgrep.json
  
      - name: Summary
        id: count
        run: |
          FILE="reports/semgrep.json"
  
          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' $FILE)
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' $FILE)
  
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
  
      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/
# =========================
# 🔹 2. create the incident
# =========================
  create-incident:
    runs-on: ubuntu-latest
    needs: scan
  
    if: needs.scan.outputs.critical != '0' || needs.scan.outputs.high != '0'
  
    permissions:
      issues: write
      contents: read
  
    outputs:
      issue_number: ${{ steps.issue.outputs.issue_number }}
      incident_id: ${{ steps.issue.outputs.incident_id }}
  
    steps:
      - name: Create Issue
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Security Incident Detected",
              body: "Scan completed. Incident created."
            });
  
            const issueNumber = issue.data.number;
            const build = process.env.GITHUB_RUN_NUMBER;
  
            const incidentId = `INC-${build}-${issueNumber}`;
  
            core.setOutput("issue_number", issueNumber);
            core.setOutput("incident_id", incidentId);
  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
      - uses: actions/upload-artifact@v4
        with:
          name: incident-report-json
          path: final/incident.json
#============================          
# 🔹 3. incident-report
# =========================
  incident-report:
    runs-on: ubuntu-latest
    needs: create-incident
  
    permissions:
      contents: read
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: security-report
          path: reports
  
      - name: Generate Incident Report
        env:
          INCIDENT_ID: ${{ needs.create-incident.outputs.incident_id }}
          ISSUE_NO: ${{ needs.create-incident.outputs.issue_number }}
          BUILD_NO: ${{ github.run_number }}
  
        run: |
          set -e
  
          FILE="reports/semgrep.json"
          mkdir -p final
  
          # 🔹 Validate file
          if [ ! -f "$FILE" ]; then
            echo "❌ Missing semgrep report"
            exit 1
          fi
  
          # 🔹 Counts
          TOTAL=$(jq '.results | length' "$FILE")
          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' "$FILE")
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' "$FILE")
  
          # 🔹 Extract relevant vulnerabilities (Critical + High)
          jq '
            [.results[]
              | select(.extra.severity=="ERROR" or .extra.severity=="WARNING")
              | {
                  file: .path,
                  severity: .extra.severity,
                  rule: .check_id,
                  message: .extra.message
                }
            ]
          ' "$FILE" > final/vuln-filtered.json
  
          # 🔹 Extract PRIMARY vulnerability (ONLY ONE)
          jq '
            [.results[]
             | select(.extra.severity=="ERROR" or .extra.severity=="WARNING")
            ] | .[0]
          ' "$FILE" > final/primary-vuln.json
  
          # 🔹 Unique affected files
          jq -r '.[].file' final/vuln-filtered.json | sort -u > final/affected-files.txt
  
          # 🔹 PRINT SUMMARY
          echo "=================================================="
          echo "🚨 INCIDENT LINKED VULNERABILITY SUMMARY"
          echo "=================================================="
          echo "Incident ID   : $INCIDENT_ID"
          echo "Issue Number  : $ISSUE_NO"
          echo "Build Number  : $BUILD_NO"
          echo "Status        : OPEN"
          echo "--------------------------------------------------"
          echo "Total Issues  : $TOTAL"
          echo "Critical      : $CRITICAL"
          echo "High          : $HIGH"
          echo "--------------------------------------------------"
          echo "📂 Affected Files:"
          cat final/affected-files.txt
          echo "--------------------------------------------------"
          echo "📌 Detailed Issues:"
          jq -r '.[] |
            "File: \(.file)\nSeverity: \(.severity)\nRule: \(.rule)\nMessage: \(.message)\n-------------------"
          ' final/vuln-filtered.json
          echo "=================================================="
  
          # 🔹 TEXT REPORT
          cat > final/incident-report.txt <<EOF
          ==================================================
          🚨 SECURITY INCIDENT REPORT
          ==================================================
          Incident ID   : $INCIDENT_ID
          Issue Number  : $ISSUE_NO
          Build Number  : $BUILD_NO
          Status        : OPEN
          Generated     : $(date)
  
          Total         : $TOTAL
          Critical      : $CRITICAL
          High          : $HIGH
  
          Affected Files:
          $(cat final/affected-files.txt)
  
          ==================================================
          EOF
  
          # 🔹 FINAL CLEAN JSON (CORRECT STRUCTURE)
          jq -n \
            --arg id "$INCIDENT_ID" \
            --arg issue "$ISSUE_NO" \
            --arg build "$BUILD_NO" \
            --argjson vulns "$(cat final/vuln-filtered.json)" \
            --argjson primary "$(cat final/primary-vuln.json)" '
          {
            incident_id: $id,
            issue_number: $issue,
            build_number: $build,
            status: "OPEN",
  
            summary: {
              total: ($vulns | length),
              critical: ($vulns | map(select(.severity=="ERROR")) | length),
              high: ($vulns | map(select(.severity=="WARNING")) | length)
            },
  
            affected_files: ($vulns | map(.file) | unique),
  
            target_vulnerability: {
              file: $primary.path,
              severity: $primary.extra.severity,
              rule: $primary.check_id,
              message: $primary.extra.message
            },
  
            vulnerabilities: $vulns
          }' > final/incident.json
  
      - uses: actions/upload-artifact@v4
        with:
          name: incident-report-json
          path: final/

# =========================
# 🔹 4. Prepare environment
# =========================
  prepare-env:
    runs-on: ubuntu-latest
    needs: create-incident
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          name: security-report
          path: reports
  
      # 🔹 Install base tools
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq git
          pip install semgrep
  
      # 🔹 Cache Ollama Models
      - name: Cache Ollama Models
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: /root/.ollama
          key: ollama-${{ runner.os }}-llama3-v1
  
      # 🔹 Install Ollama (lightweight)
      - name: Install Ollama
        run: |
          if ! command -v ollama &> /dev/null; then
            echo "Installing Ollama..."
            curl -fsSL https://ollama.com/install.sh | sh
          else
            echo "Ollama already installed"
          fi
  
      # 🔹 Load / Pull Model (only if cache miss)
      - name: Setup LLM Model
        run: |
          # Start Ollama server in background
          echo "Starting Ollama server..."
          nohup ollama serve > ollama.log 2>&1 &
      
          # Wait until server is ready
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags >/dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama..."
            sleep 2
          done
      
          # Pull model only if cache miss
          if [ "${{ steps.ollama-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss → Pulling model"
            ollama pull llama3
          else
            echo "Cache hit → Using cached model"
          fi
      # 🔹 Verify
      - name: Verify Ollama
        run: |
          ollama list

# =========================
# 🔹 5.  ai-fix
# =========================
  ai-fix:
    runs-on: ubuntu-latest
    needs: [incident-report, prepare-env]
  
    permissions:
      contents: write

    outputs:
      fixed_file: ${{ steps.fix.outputs.fixed_file }}
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          name: incident-report-json
          path: incident
  
      - name: Install Dependencies + Ollama
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
  
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3
  
      # 🔹 Extract ONLY one vulnerability
      - name: Read Target Vulnerability
        id: vuln
        run: |
          FILE=$(jq -r '.target_vulnerability.file' incident/incident.json)
          RULE=$(jq -r '.target_vulnerability.rule' incident/incident.json)
          MSG=$(jq -r '.target_vulnerability.message' incident/incident.json)
  
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "rule=$RULE" >> $GITHUB_OUTPUT
          echo "message=$MSG" >> $GITHUB_OUTPUT
  
      # 🔹 Fix only that file
      - name: AI Fix Loop (Stable + Working)
        id: fix
        shell: bash
        run: |
          set -e
      
          INCIDENT_FILE="incident/incident.json"
          ENV_FILE="config/.env"
      
          mkdir -p config final
          touch "$ENV_FILE"
      
          ########################################
          # 🔹 Extract vulnerability
          ########################################
          FILE=$(jq -r '.target_vulnerability.file' "$INCIDENT_FILE")
          RULE=$(jq -r '.target_vulnerability.rule' "$INCIDENT_FILE")
      
          if [ -z "$FILE" ] || [ "$FILE" = "null" ]; then
            echo "❌ No valid vulnerability"
            exit 1
          fi
      
          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            exit 1
          fi
      
          ########################################
          # 🔁 LOOP CONFIG
          ########################################
          MAX_RETRIES=5
          ATTEMPT=0
          FOUND=1
      
          echo "🎯 Fixing: $FILE"
          echo "Rule: $RULE"
      
          ########################################
          # 🔁 LOOP
          ########################################
          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT+1))
            echo "🔄 Attempt $ATTEMPT"
      
            ########################################
            # 🔹 SECRET FIX
            ########################################
            grep -Eo '(api_key|token|secret|jwt)[^=]*=[^ ]+' "$FILE" > secrets.txt || true
      
            if [ -s secrets.txt ]; then
              echo "⚠️ Moving secrets to .env"
      
              while read -r line; do
                KEY=$(echo "$line" | cut -d '=' -f1 | tr '[:lower:]' '[:upper:]')
                VALUE=$(echo "$line" | cut -d '=' -f2)
      
                echo "$KEY=$VALUE" >> "$ENV_FILE"
                sed -i "s|$VALUE|\${$KEY}|g" "$FILE"
              done < secrets.txt
            fi
      
            ########################################
            # 🔹 SAFE PROMPT (NO HEREDOC BUG)
            ########################################
            echo "Fix ONLY this GitHub Actions vulnerability:" > prompt.txt
            echo "- Prevent shell injection" >> prompt.txt
            echo "- Use env: variables instead" >> prompt.txt
            echo "- Use \"\$VAR\" safely" >> prompt.txt
            echo "- Do NOT change business logic" >> prompt.txt
            echo "- Return FULL file only" >> prompt.txt
            echo "" >> prompt.txt
            echo "RULE: $RULE" >> prompt.txt
            echo "" >> prompt.txt
            echo "CODE:" >> prompt.txt
            cat "$FILE" >> prompt.txt
      
            ########################################
            # 🔹 AI EXECUTION
            ########################################
            RESPONSE=$(ollama run llama3 < prompt.txt)
      
            if [ -z "$RESPONSE" ]; then
              echo "❌ Empty AI response"
              exit 1
            fi
      
            cp "$FILE" "$FILE.bak"
            echo "$RESPONSE" > "$FILE"
      
          ########################################
          # 🔹 VALIDATION (SAFE)
          ########################################
          echo "🔍 Validating..."
          
          semgrep scan --config=auto "$FILE" --json --output=validation.json || true
          
          # ✅ Ensure file exists (critical fix)
          if [ ! -f validation.json ]; then
            echo "{}" > validation.json
          fi
          
          # ✅ Ensure valid JSON structure
          if ! jq empty validation.json >/dev/null 2>&1; then
            echo "{}" > validation.json
          fi
          
          FOUND=$(jq --arg file "$FILE" --arg rule "$RULE" '
            (.results // [])
            | map(select(.path==$file and .check_id==$rule))
            | length
          ' validation.json)
          
          echo "Remaining: $FOUND"
      
            ########################################
            # 🔹 EXIT CONDITION
            ########################################
            if [ "$FOUND" -eq 0 ]; then
              echo "🎉 FIXED"
              break
            fi
      
            echo "↩️ Reverting..."
            mv "$FILE.bak" "$FILE"
          done
      
          ########################################
          # 🔹 FINAL CHECK
          ########################################
          if [ "$FOUND" -ne 0 ]; then
            echo "❌ Failed after retries"
            exit 1
          fi
      
          ########################################
          # 🔹 OUTPUT
          ########################################
          echo "fixed_file=$FILE" >> $GITHUB_OUTPUT
      
          ########################################
          # 🔹 SUMMARY (SAFE WRITE)
          ########################################
          {
            echo "FIX SUCCESS"
            echo "File: $FILE"
            echo "Rule: $RULE"
            echo "Attempts: $ATTEMPT"
            echo "Date: $(date)"
          } > final/incident-fix-summary.txt
      
          echo "✅ Done"
      
      ########################################
      # 🔹 Upload Summary
      ########################################
      - name: Upload AI Fixed Code
        uses: actions/upload-artifact@v4
        with:
          name: ai-fixed-code   # ✅ MUST MATCH download name
          path: |
            .github/workflows/release.yml
            config/.env
# =========================
# 🔹 6.  validate-ai-fix
# =========================
  validate-ai-fix:
    runs-on: ubuntu-latest
    needs: [ai-fix, incident-report]
  
    permissions:
      contents: read
      issues: write
  
    outputs:
      validation_status: ${{ steps.validate.outputs.status }}
      fixed_file: ${{ steps.meta.outputs.file }}
      issue_number: ${{ steps.meta.outputs.issue }}
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          name: incident-report-json
          path: incident
  
      ########################################
      # 🔹 Install Dependencies
      ########################################
      - name: Install Dependencies
        run: |
          pip install semgrep
          sudo apt-get install -y jq git
  
      ########################################
      # 🔹 Extract Metadata
      ########################################
      - name: Extract Metadata
        id: meta
        run: |
          FILE=$(jq -r '.target_vulnerability.file' incident/incident.json)
          RULE=$(jq -r '.target_vulnerability.rule' incident/incident.json)
          ISSUE=$(jq -r '.issue_number' incident/incident.json)
  
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "rule=$RULE" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
  
      ########################################
      # 🔹 VALIDATION
      ########################################
      - name: Validate AI Fix
        id: validate
        run: |
          set -e
      
          FILE="${{ steps.meta.outputs.file }}"
          RULE="${{ steps.meta.outputs.rule }}"
          ENV_FILE="config/.env"
      
          mkdir -p validation final
      
          echo "FILE: $FILE"
          echo "RULE: $RULE"
      
          ########################################
          # 🔴 Safety Check
          ########################################
          if [ -z "$FILE" ] || [ "$FILE" = "null" ]; then
            echo "❌ FILE missing"
            echo "status=FAILED" >> $GITHUB_OUTPUT
            exit 0
          fi
      
          if [ -z "$RULE" ] || [ "$RULE" = "null" ]; then
            echo "❌ RULE missing"
            echo "status=FAILED" >> $GITHUB_OUTPUT
            exit 0
          fi
      
          ########################################
          # 🔹 Save FIXED
          ########################################
          cp "$FILE" validation/fixed.file
      
          ########################################
          # 🔹 Restore ORIGINAL
          ########################################
          git checkout HEAD -- "$FILE"
          cp "$FILE" validation/original.file
      
          ########################################
          # 🔹 Restore FIXED again
          ########################################
          cp validation/fixed.file "$FILE"
      
          ########################################
          # 🔹 SCAN
          ########################################
          semgrep scan --config=auto "$FILE" --json --output=validation/post.json || true
          [ -f validation/post.json ] || echo '{}' > validation/post.json
      
          ########################################
          # 🔹 COUNT ONLY SAME RULE
          ########################################
          FOUND=$(jq --arg file "$FILE" --arg rule "$RULE" '
            (.results // [])
            | map(select(.path==$file and .check_id==$rule))
            | length
          ' validation/post.json)
      
          echo "Remaining issues for rule: $FOUND"
      
          ########################################
          # 🔹 LOGIC CHECK
          ########################################
          DIFF_LINES=$(diff validation/original.file validation/fixed.file | wc -l)
      
          if [ "$DIFF_LINES" -gt 80 ]; then
            LOGIC_STATUS="FAILED"
          else
            LOGIC_STATUS="PASSED"
          fi
      
          ########################################
          # 🔹 SECRET CHECK (ignore env usage)
          ########################################
          SECRET_IN_FILE=$(grep -Ei '(api[_-]?key|token|secret|jwt)\s*=' "$FILE" || true)
      
          if [ -n "$SECRET_IN_FILE" ]; then
            SECRET_STATUS="FAILED"
          else
            SECRET_STATUS="PASSED"
          fi
      
          ########################################
          # 🔹 ENV CHECK (optional, non-blocking)
          ########################################
          if [ -f "$ENV_FILE" ]; then
            ENV_STATUS="PASSED"
          else
            ENV_STATUS="WARNING"
          fi
      
          ########################################
          # 🔥 FINAL DECISION (RELAXED + PRACTICAL)
          ########################################
          if [ "$FOUND" -eq 0 ] && \
             [ "$LOGIC_STATUS" = "PASSED" ] && \
             [ "$SECRET_STATUS" = "PASSED" ]; then
      
            FINAL_STATUS="SUCCESS"
          else
            FINAL_STATUS="FAILED"
          fi
      
          echo "FINAL STATUS: $FINAL_STATUS"
      
          ########################################
          # 🔹 OUTPUT (CRITICAL)
          ########################################
          echo "status=$FINAL_STATUS" >> $GITHUB_OUTPUT
      
          ########################################
          # 🔹 SUMMARY
          ########################################
          {
            echo "=================================="
            echo "AI FIX VALIDATION REPORT"
            echo "=================================="
            echo "File           : $FILE"
            echo "Rule           : $RULE"
            echo "Remaining      : $FOUND"
            echo "Logic Status   : $LOGIC_STATUS"
            echo "Secret Status  : $SECRET_STATUS"
            echo "ENV Status     : $ENV_STATUS"
            echo "FINAL STATUS   : $FINAL_STATUS"
            echo "=================================="
          } > final/validation-summary.txt
  
      ########################################
      # 🔹 Upload Summary
      ########################################
      - name: Upload Validation Summary
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary
          path: final/


# =========================
# 🔹 7. close-incident
# =========================
  close-incident:
    runs-on: ubuntu-latest
    needs: validate-ai-fix
    permissions:
      issues: write
  
    steps:
    - name: Close GitHub Incident
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ISSUE_NO="${{ needs.validate-ai-fix.outputs.issue_number }}"
    
        echo "🔒 Closing Issue: $ISSUE_NO"
    
        curl -X PATCH \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NO \
          -d '{"state":"closed"}'


# =========================
# 🔹 8. commit
# =========================
  commit-ai-fix:
    runs-on: ubuntu-latest
    needs: validate-ai-fix
  
    if: needs.validate-ai-fix.outputs.validation_status == 'FAILED'
  
    permissions:
      contents: write
      issues: write
  
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      ########################################
      # 🔹 Download AI fixed files (REAL FIX)
      ########################################
      - name: Download AI Fixed Code
        uses: actions/download-artifact@v4
        with:
          name: ai-fixed-code
          path: .
  
      ########################################
      # 🔹 Commit Changes
      ########################################
      - name: Commit AI Fix Changes
        run: |
          set -e
  
          FILE=".github/workflows/release.yml"
          ENV_PATH="config/.env"
  
          BUILD_NO="${GITHUB_RUN_NUMBER}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FIX_BRANCH="ai-fix/build-${BUILD_NO}-${SHORT_SHA}"
  
          echo "Branch: $FIX_BRANCH"
  
          git config user.name "SumangalaBhat"
          git config user.email "sumangala.bhat18@gmail.com"
  
          ########################################
          # 🔹 Create Branch
          ########################################
          git checkout -b "$FIX_BRANCH"
  
          ########################################
          # 🔹 Add Files (IMPORTANT)
          ########################################
          git add -A
  
          ########################################
          # 🔹 Avoid workflow permission issue
          ########################################
          git reset .github/workflows || true
  
          ########################################
          # 🔹 Check changes
          ########################################
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit"
            exit 0
          fi
  
          ########################################
          # 🔹 Commit
          ########################################
          git commit -m "🤖 AI Security Fix
  
          Build: $BUILD_NO
          File: $FILE
  
          ✔ AI remediation applied
          ✔ Secrets moved to .env
          "
  
      ########################################
      # 🔹 Push
      ########################################
      - name: Push Branch
        run: |
          set -e
  
          BUILD_NO="${GITHUB_RUN_NUMBER}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FIX_BRANCH="ai-fix/build-${BUILD_NO}-${SHORT_SHA}"
  
          echo "🚀 Pushing branch: $FIX_BRANCH"
  
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} "$FIX_BRANCH"
  
          echo "✅ Branch pushed successfully"


      
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} "$FIX_BRANCH"
      
          echo "✅ Branch pushed successfully"

# =========================
# 🔹 9. publish-summary-report
# =========================
  publish-summary-report:
    runs-on: ubuntu-latest
    needs:
      - scan
      - create-incident
      - incident-report
      - ai-fix
      - validate-ai-fix
      - close-incident
      - commit-ai-fix

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      ########################################
      # 🔹 Checkout (required for pages)
      ########################################
      - uses: actions/checkout@v4

      ########################################
      # 🔹 Download ALL artifacts
      ########################################
      - name: Download Security Report
        uses: actions/download-artifact@v4
        with:
          name: security-report
          path: data/security

      - name: Download Incident Report
        uses: actions/download-artifact@v4
        with:
          name: incident-report-json
          path: data/incident

      - name: Download AI Fix Summary
        uses: actions/download-artifact@v4
        with:
          name: ai-fixed-code
          path: data/ai-fix
        continue-on-error: true

      - name: Download Validation Summary
        uses: actions/download-artifact@v4
        with:
          name: validation-summary
          path: data/validation
        continue-on-error: true

      ########################################
      # 🔹 Generate HTML Report
      ########################################
      - name: Generate HTML Dashboard
        run: |
          mkdir -p site

          INCIDENT_JSON="data/incident/incident.json"
          SCAN_JSON="data/security/semgrep.json"

          # Fallbacks
          [ -f "$INCIDENT_JSON" ] || echo '{}' > "$INCIDENT_JSON"
          [ -f "$SCAN_JSON" ] || echo '{"results":[]}' > "$SCAN_JSON"

          TOTAL=$(jq '.results | length' $SCAN_JSON)
          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' $SCAN_JSON)
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' $SCAN_JSON)

          INCIDENT_ID=$(jq -r '.incident_id // "N/A"' $INCIDENT_JSON)
          ISSUE_NO=$(jq -r '.issue_number // "N/A"' $INCIDENT_JSON)
          STATUS="CLOSED"

          FILE=$(jq -r '.target_vulnerability.file // "N/A"' $INCIDENT_JSON)
          RULE=$(jq -r '.target_vulnerability.rule // "N/A"' $INCIDENT_JSON)

          BUILD_NO="${GITHUB_RUN_NUMBER}"
          BRANCH="ai-fix/build-${BUILD_NO}-$(git rev-parse --short HEAD)"
          COMMIT_ID=$(git rev-parse HEAD)
          AUTHOR=$(git log -1 --pretty=format:'%an')

          ########################################
          # 🔥 HTML FILE
          ########################################
          cat > site/index.html <<EOF
          <html>
          <head>
            <title>DevSecOps AI Report</title>
            <style>
              body { font-family: Arial; padding: 20px; background:#0f172a; color:white;}
              h1 { color:#38bdf8; }
              .card { background:#1e293b; padding:20px; margin:10px 0; border-radius:10px;}
              .ok { color:#22c55e; }
              .warn { color:#facc15; }
              .bad { color:#ef4444; }
            </style>
          </head>
          <body>

          <h1>🚀 DevSecOps + Agentic AI Report</h1>

          <div class="card">
            <h2>🔍 Scan Summary</h2>
            <p>Total: $TOTAL</p>
            <p class="bad">Critical: $CRITICAL</p>
            <p class="warn">High: $HIGH</p>
          </div>

          <div class="card">
            <h2>🚨 Incident</h2>
            <p>ID: $INCIDENT_ID</p>
            <p>Issue #: $ISSUE_NO</p>
            <p>Status: <span class="ok">$STATUS</span></p>
          </div>

          <div class="card">
            <h2>🤖 AI Fix</h2>
            <p>File Fixed: $FILE</p>
            <p>Rule: $RULE</p>
            <p class="ok">Status: FIX APPLIED</p>
          </div>

          <div class="card">
            <h2>🧪 Validation</h2>
            <p class="ok">Status: COMPLETED</p>
          </div>

          <div class="card">
            <h2>📦 Git Commit</h2>
            <p>Branch: $BRANCH</p>
            <p>Commit: $COMMIT_ID</p>
            <p>Author: $AUTHOR</p>
          </div>

          </body>
          </html>
          EOF

      ########################################
      # 🔹 Upload Pages Artifact
      ########################################
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      ########################################
      # 🔹 Deploy to GitHub Pages
      ########################################
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
