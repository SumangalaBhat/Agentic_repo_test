name: WebGoat DevSecOps + Agentic AI

on:
  push:
  pull_request:

env:
  REPORT_DIR: reports
  FIX_DIR: ai-fixes

jobs:

# =========================
# 🔹 1. SETUP
# =========================
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare workspace
        run: |
          mkdir -p $REPORT_DIR $FIX_DIR

# =========================
# 🔹 3. SEMGREP (Code Scan)
# =========================
  semgrep:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p $REPORT_DIR
          semgrep --config=auto --json > $REPORT_DIR/semgrep.json || echo "{}" > $REPORT_DIR/semgrep.json
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/

# =========================
# 🔹 4. DEPENDENCY CHECK
# =========================
  dependency:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: WebGoat
          path: .
          format: JSON
          out: reports

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/

# =========================
# 🔹 5. SUMMARY (BEFORE FIX)
# =========================
  summary-before:
    runs-on: ubuntu-latest
    needs: [semgrep, dependency]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - name: Generate Summary
        run: |
          echo "🚨 BEFORE FIX SUMMARY"
          echo "--------------------------------"
          TOTAL=$(jq '.results | length' reports/semgrep.json 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' reports/semgrep.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' reports/semgrep.json 2>/dev/null || echo 0)
          echo "CRITICAL : $CRITICAL"
          echo "HIGH     : $HIGH"
          echo "TOTAL    : $TOTAL"
          echo "$TOTAL" > before_count.txt
      - uses: actions/upload-artifact@v4
        with:
          name: before-count
          path: before_count.txt

# =========================
# 🔹 6. AI FIX (OLLAMA)
# =========================
  ai-fix:
    runs-on: ubuntu-latest
    needs: semgrep

    permissions:
        contents: write
        pull-requests: write
        

    env:
      FIX_BRANCH: ai-fix-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports



      - name: Install & Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
      
          # Start Ollama in background
          nohup ollama serve > ollama.log 2>&1 &
      
          # Wait for server to be ready
          sleep 10
      
          # Pull model
          ollama pull llama3

      - name: Verify Ollama is running
        run: |
          curl http://localhost:11434 || (echo "Ollama failed to start" && exit 1)
    #  - name: AI Fix Vulnerabilities
     #   run: |
      #    mkdir -p ai-fixes
      
       #   FILES=$(jq -r '.results[].path' reports/semgrep.json | sort -u)
      
       #   for file in $FILES; do
        #    if [ -f "$file" ]; then
         #     echo "Fixing $file"
      
           #   FIXED=$(ollama run llama3 "
           #   Fix all security vulnerabilities (SQLi, XSS, etc).
           #   Return only fixed code.
              
            #  $(cat $file)
             # ")
              
                  #    mkdir -p $(dirname ai-fixes/$file)
                    #  echo "$FIXED" > ai-fixes/$file
                  #  fi
                 # done
    # =========================
    # 🔹 Create Branch
    # =========================
      - name: Create Fix Branch
        run: |
          set -e
      
          git config user.name "SumangalaBhat"
          git config user.email "sumangala.bhat18@gmail.com"
      
          git fetch origin
      
          # Always create clean branch (safe in CI)
          git checkout -B $FIX_BRANCH
      
          echo "config/.env" 
      
          git add .gitignore
      
          echo "✅ Branch created: $FIX_BRANCH"
      

    # =========================
    # 🔹 Fix ONE Critical Issue
    # =========================
      - name: AI Fix (Create Duplicate File + Secret Handling)
        run: |
            set -e
        
            mkdir -p ai-fixes
            mkdir -p config
            touch config/.env
        
            echo "🔍 Selecting one CRITICAL vulnerability..."
        
            VULN=$(jq -c '[.results[] | select(.extra.severity=="ERROR")][0]' reports/semgrep.json)
        
            if [ "$VULN" = "null" ] || [ -z "$VULN" ]; then
              echo "✅ No CRITICAL vulnerabilities found"
              exit 0
            fi
        
            FILE=$(echo "$VULN" | jq -r '.path')
            START=$(echo "$VULN" | jq -r '.start.line')
            END=$(echo "$VULN" | jq -r '.end.line')
        
            echo "FILE=$FILE" >> $GITHUB_ENV
            echo "ENV_PATH=config/.env" >> $GITHUB_ENV
        
            echo "📄 File: $FILE"
            echo "📍 Lines: $START - $END"
        
            if [ ! -f "$FILE" ]; then
              echo "❌ File not found: $FILE"
              exit 1
            fi
        
            SNIPPET=$(sed -n "${START},${END}p" "$FILE")
        
            if [ -z "$SNIPPET" ]; then
              echo "❌ Empty snippet, skipping"
              exit 1
            fi
        
            echo "⚠️ Vulnerable Code:"
            echo "$SNIPPET"
        
            echo "🤖 Fixing with Ollama..."
        
            FIXED=$(ollama run llama3:8b <<EOF
            Fix this CRITICAL security vulnerability in Java code.
            
            Rules:
            - Prevent SQL Injection / XSS
            - Move any secrets to environment variables
            - Use System.getenv("VAR_NAME")
            - Keep logic intact
            - Return ONLY fixed code
            
            $SNIPPET
            EOF
            )
            
                if [ -z "$FIXED" ]; then
                  echo "❌ AI did not return a fix"
                  exit 1
                fi
        
            # =========================
            # 🔐 GENERIC SECRET DETECTION
            # =========================
              echo "🔐 Checking for secrets..."
          
              MATCH=$(echo "$FIXED" | grep -nEi '(password|secret|token|api[_-]?key)\s*=\s*".+"' || true)
          
              if [ -n "$MATCH" ]; then
                VALUE=$(echo "$MATCH" | grep -oE '"[^"]+"' | tr -d '"')
                KEY=$(echo "$MATCH" | grep -oiE '(password|secret|token|api[_-]?key)' | head -1 | tr '[:lower:]' '[:upper:]')
          
                VAR_NAME="${KEY}_ENV"
          
                echo "👉 Storing $VAR_NAME in .env"
          
                if ! grep -q "^$VAR_NAME=" config/.env; then
                  echo "$VAR_NAME=$VALUE" >> config/.env
                fi
          
                FIXED=$(echo "$FIXED" | sed "s|\"$VALUE\"|System.getenv(\"$VAR_NAME\")|g")
              fi
          
  
              # =========================
              # 🔐 JWT DETECTION (FULL TOKEN)
              # =========================
              echo "🔍 Checking for JWT..."
              
              jwt=$(printf "%s" "$FIXED" | grep -oE 'eyJ[[:alnum:]_-]+\.[[:alnum:]_.+-]+\.[[:alnum:]_.+-]+' | head -1)
              jwt=$(echo "$jwt" | tr -d '\n\r ')
              
              echo "DEBUG JWT: [$jwt]"
              
              VAR_NAME="JWT_TOKEN_ENV"
              
              if [ -n "$jwt" ] && [[ "$jwt" == *"."*"."* ]] && [ "${#jwt}" -gt 20 ]; then
              
                if [ -f "config/.env" ]; then
                  echo "🔐 Valid JWT detected"
              
                  if ! grep -q "^$VAR_NAME=" config/.env; then
                    echo "$VAR_NAME=$jwt" >> config/.env
                    echo "✅ Stored JWT in .env"
                  else
                    echo "ℹ️ Variable already exists"
                  fi
              
                  ESCAPED_JWT=$(printf '%s\n' "$jwt" | sed -e 's/[\/&]/\\&/g')
              
                  FIXED=$(printf "%s" "$FIXED" | sed "s|$ESCAPED_JWT|System.getenv(\"$VAR_NAME\")|g")
              
                else
                  echo "⛔ Skipping: config/.env does not exist"
                fi
              
              else
                echo "❌ No valid JWT found — skipping .env write"
              fi
              # =========================
              # 📄 CREATE FIXED FILE
              # =========================
              NEW_FILE="ai-fixes/${FILE%.java}_fixed.java"
              echo "NEW_FILE=$NEW_FILE" >> $GITHUB_ENV
          
              mkdir -p "$(dirname "$NEW_FILE")"
          
              awk -v start="$START" -v end="$END" -v fix="$FIXED" '
                NR==start {print fix}
                NR<start || NR>end {print}
              ' "$FILE" > "$NEW_FILE"
          
              echo "✅ Fixed file created: $NEW_FILE"
          
              echo "📄 .env content:"
              cat config/.env || echo "EMPTY"


      - name: Upload Fixed Code
        uses: actions/upload-artifact@v4
        with:
          name: fixed-code
          path: ai-fixes/

    # =========================
    # 🔹 Commit & Push
    # =========================
      - name: Commit AI Fix Changes
        run: |
          set -e
      
          git config user.name "SumangalaBhat"
          git config user.email "sumangala.bhat18@gmail.com"
      
          echo "📦 Staging files..."
      
          # Add fixed file
          if [ -n "$NEW_FILE" ] && [ -f "$NEW_FILE" ]; then
            git add "$NEW_FILE"
          fi
      
          # 🔥 IMPORTANT: force add .env even if ignored
          if [ -f "$ENV_PATH" ]; then
            git add -f "$ENV_PATH"
          fi
      
          echo "🔍 Checking diff..."
          DIFF=$(git diff --cached || true)
      
          if [ -z "$DIFF" ]; then
            echo "⚠️ No changes to commit"
            exit 0
          fi
      
          git commit -m "🤖 AI Fix: ${FILE}" \
                     -m "🔐 Secrets moved to config/.env" \
                     -m "🛠️ Generated by Ollama"
      
          echo "✅ Commit created"
      
          echo "✅ Commit created"

      - name: Push Branch
        run: |
          set -e
      
          echo "🚀 Pushing branch: $FIX_BRANCH"
      
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} $FIX_BRANCH --force
      
          echo "✅ Branch pushed successfully"


      # =========================
      # 🔹 Prepare Changes (Clean + Controlled)
      # =========================
      - name: Prepare AI Fix Changes
        run: |
          echo "🧹 Cleaning unwanted files..."
      
          # Ignore unwanted artifacts
          echo "diff_output.txt" >> .gitignore
          echo "ollama.log" >> .gitignore
          echo "reports/" >> .gitignore
      
          git rm -r --cached reports 2>/dev/null || true
          git rm --cached diff_output.txt 2>/dev/null || true
          git rm --cached ollama.log 2>/dev/null || true
      
          # Stage ONLY source code files (adjust if needed)
          echo "📦 Staging source code changes..."
          git add '*.java' '*.js' '*.ts' '*.py' || true
      
          # Skip if nothing changed
          if git diff --cached --quiet; then
            echo "⚠️ No changes detected. Skipping PR."
            echo "skip_pr=true" >> $GITHUB_ENV
          fi
      
      
      # =========================
      # 🔹 Generate Diff + AI Explanation
      # =========================
      - name: Generate PR Details
        if: env.skip_pr != 'true'
        run: |
          echo "🧠 Generating PR details..."
      
          CHANGED_FILES=$(git diff --cached --name-only)
      
          echo "## 🚨 AI Generated Security Fix" > pr_details.md
          echo "" >> pr_details.md
      
          for file in $CHANGED_FILES; do
            echo "Processing $file..."
      
            DIFF=$(git diff --cached -U5 "$file" | head -n 200)
      
            # Call Ollama for explanation
            EXPLANATION=$(ollama run llama3 <<EOF
          Explain this code fix clearly for a developer. Focus on:
          - What was wrong
          - What vulnerability it fixes
          - Why the fix is secure
          
          Code diff:
                  $DIFF
                  EOF
                  )
                  
                        {
                          echo "### 📄 File: $file"
                          echo '```diff'
                          echo "$DIFF"
                          echo '```'
                          echo ""
                          echo "💡 **Explanation:**"
                          echo "$EXPLANATION"
                          echo ""
                          echo "---"
                        } >> pr_details.md
                  
              done
      
      # =========================
      # 🔹 Create Pull Request (FIXED)
      # =========================
      - name: Create Pull Request
        if: env.skip_pr != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-fix-${{ github.run_id }}   # ✅ PR branch (auto-created)
          base: main                            # ✅ MUST exist (fixes your error)
          title: "🤖 AI Security Fix with Explanation"
          body-path: pr_details.md
          commit-message: "🤖 AI Fix: security patch applied with explanation"
          delete-branch: true

# =========================
# 🔹 7. RE-SCAN AFTER FIX
# =========================
  rescan:
    runs-on: ubuntu-latest
    needs: ai-fix

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fixed-code
          path: fixed

      - name: Install Semgrep
        run: pip install semgrep

      - name: Re-run Scan
        run: |
          semgrep --config=auto fixed --json > after.json || echo "{}" > after.json
      - name: Count After Fix
        run: |
          AFTER=$(jq '.results | length' after.json 2>/dev/null || echo 0)
          echo "$AFTER" > after_count.txt
      - uses: actions/upload-artifact@v4
        with:
          name: after-count
          path: after_count.txt

# =========================
# 🔹 8. FINAL REPORT
# =========================
  final-report:
    runs-on: ubuntu-latest
    needs: [summary-before, rescan, ai-fix]
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: before-count
  
      - uses: actions/download-artifact@v4
        with:
          name: after-count
  
      - uses: actions/download-artifact@v4
        with:
          name: fixed-code
          path: fixed
  
      - name: Print Final Summary
        run: |
          BEFORE=$(cat before_count.txt || echo 0)
          AFTER=$(cat after_count.txt || echo 0)
          RESOLVED=$((BEFORE - AFTER))
  
          echo "🚨 FINAL VULNERABILITY REPORT"
          echo "--------------------------------"
          echo "Before Fix : $BEFORE"
          echo "After Fix  : $AFTER"
          echo "Resolved   : $RESOLVED"
          echo "--------------------------------"
  
          if [ "$AFTER" -gt 0 ]; then
            echo "⚠️ Vulnerabilities still exist!"
            exit 1
          else
            echo "✅ All vulnerabilities fixed"
          fi
# =========================
# 🔹 9. ENTERPRISE DASHBOARD + GITHUB PAGES
# =========================
  publish-report:
    runs-on: ubuntu-latest
    needs: final-report
  
    permissions:
      contents: write
  
    steps:
      - uses: actions/checkout@v4
  
      # -----------------------------
      # Download required artifacts
      # -----------------------------
      - uses: actions/download-artifact@v4
        with:
          name: before-count
  
      - uses: actions/download-artifact@v4
        with:
          name: after-count
  
      - uses: actions/download-artifact@v4
        with:
          name: fixed-code
          path: fixed
  
      # -----------------------------
      # Git metadata
      # -----------------------------
      - name: Collect Git Info
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr ' ' '-')
  
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV
  
          echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "AUTHOR_NAME=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
  
          git diff --name-only HEAD~1 HEAD > changed_files.txt || echo "No changes" > changed_files.txt
  
      # -----------------------------
      # Generate SAME dashboard as artifact
      # -----------------------------
      - name: Generate Dashboard
        run: |
          BEFORE=$(cat before_count.txt || echo 0)
          AFTER=$(cat after_count.txt || echo 0)
          RESOLVED=$((BEFORE - AFTER))
          RISK=$((AFTER * 10 + BEFORE * 2))
  
          FILE_LIST=$(sed ':a;N;$!ba;s/\n/<br>/g' changed_files.txt)
          FIXED_FILES=$(ls fixed 2>/dev/null | sed ':a;N;$!ba;s/\n/<br>/g' || echo "No fixed files")
          FIX_COUNT=$(ls fixed 2>/dev/null | wc -l || echo 0)
  
          mkdir -p site/branches
  
          cat <<EOF > site/branches/${SAFE_BRANCH}.html
            <!DOCTYPE html>
            <html>
            <head>
            <title>$BRANCH - DevSecOps Dashboard</title>
            <style>
            body {background:#0b1220;color:white;font-family:Arial;}
            .card {background:#1f2937;padding:20px;margin:10px;border-radius:10px;}
            .grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
            .success {color:#22c55e;}
            .warning {color:#f59e0b;}
            .critical {color:#ef4444;}
            a {color:#38bdf8;}
            </style>
            </head>
            <body>
            
            <h1>🚀 DevSecOps AI Dashboard</h1>
            <h3>🌿 Branch: $BRANCH</h3>
            
            <div class="grid">
            <div class="card">Total: <b>$BEFORE</b></div>
            <div class="card critical">Remaining: <b>$AFTER</b></div>
            <div class="card success">Resolved: <b>$RESOLVED</b></div>
            <div class="card warning">Risk Score: <b>$RISK</b></div>
            </div>
            
            <h2>🤖 AI Fix Insights</h2>
            <div class="grid">
            <div class="card success">Fixed Files<br><b>$FIX_COUNT</b></div>
            <div class="card">Secrets → GitHub Secrets</div>
            <div class="card">Secure Coding Applied</div>
            <div class="card">JWT/API Keys Protected</div>
            </div>
            
            <h2>📂 Changed Files</h2>
            <div class="card">$FILE_LIST</div>
            
            <h2>🛠 Fixed Files</h2>
            <div class="card">$FIXED_FILES</div>
            
            <h2>👨‍💻 Commit</h2>
            <div class="card">$COMMIT_ID<br>$COMMIT_MSG</div>
            
            </body>
            </html>
            EOF
  
      # -----------------------------
      # Pull existing gh-pages
      # -----------------------------
      - name: Prepare gh-pages branch
        run: |
          git fetch origin gh-pages || true
  
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
  
          mkdir -p branches
  
      # -----------------------------
      # Copy new report
      # -----------------------------
      - name: Copy new report
        run: |
          cp -r site/branches/* branches/
  
      # -----------------------------
      # Generate INDEX (FIXED BUG)
      # -----------------------------
      - name: Generate Index Page
        run: |
          echo "<html><body style='background:#0b1220;color:white;font-family:Arial'>" > index.html
          echo "<h1>🚀 DevSecOps Multi-Branch Dashboard</h1><ul>" >> index.html
  
          for file in branches/*.html; do
            name=$(basename "$file")
            echo "<li><a href='branches/$name'>$name</a></li>" >> index.html
          done
  
          echo "</ul></body></html>" >> index.html
  
      # -----------------------------
      # Push to GitHub Pages
      # -----------------------------
      - name: Push to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
  
          git add .
          git commit -m "Update dashboard for $BRANCH" || echo "No changes"
          git push origin gh-pages
              
              <!-- ========================= -->
              <!-- 🤖 AI FIX SECTION -->
              <!-- ========================= -->
              <h2>🤖 AI Security Fix Insights</h2>
              <div class="grid">
                <div class="card success">
                  ✔ AI Fixed Files<br>
                  <b>$FIX_COUNT</b>
                </div>
              
                <div class="card">
                  🔐 Secrets Handling<br>
                  <small>Moved to config/.env</small>
                </div>
              
                <div class="card">
                  🛡 Secure Coding<br>
                  <small>Used System.getenv()</small>
                </div>
              
                <div class="card">
                  🔑 Token Protection<br>
                  <small>JWT & API keys secured</small>
                </div>
              </div>
              
              <div class="card">
              <h3>🧠 AI Actions Performed</h3>
              <ul>
                <li>✔ Detected vulnerabilities using Semgrep</li>
                <li>✔ Fixed critical issues using Ollama LLM</li>
                <li>✔ Rewrote vulnerable code blocks securely</li>
                <li>✔ Extracted secrets into environment variables</li>
                <li>✔ Prevented SQL Injection / XSS patterns</li>
              </ul>
              </div>
              
              <!-- ========================= -->
              <!-- 📂 FILE DATA -->
              <!-- ========================= -->
              <h2>📂 Changed Files</h2>
              <div class="card">$FILE_LIST</div>
              
              <h2>🛠 Fixed Files</h2>
              <div class="card">$FIXED_FILES</div>
              
              <!-- ========================= -->
              <!-- 👨‍💻 METADATA -->
              <!-- ========================= -->
              <h2>👨‍💻 Author</h2>
              <div class="card">$AUTHOR_NAME ($AUTHOR_EMAIL)</div>
              
              <h2>🧾 Commit</h2>
              <div class="card">$COMMIT_ID<br>$COMMIT_MSG</div>
              
              </body>
              </html>
              EOF
    
          - name: Upload Pages Artifact
            uses: actions/upload-pages-artifact@v3
            with:
              path: site
      
          - name: Deploy to GitHub Pages
            uses: actions/deploy-pages@v4
